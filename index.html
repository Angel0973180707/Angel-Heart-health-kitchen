<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>養清倉管</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#1B3A2A;--surface:#234D38;--surface2:#2D5C42;--border:#3D7055;--gold:#4A7C59;--green:#5BAA7A;--red:#E05757;--blue:#4A9EFF;--text:#FFFFFF;--dim:#8FB5A0;--muted:#5A8A6A;--font:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}
#lock-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px}
.lock-logo{font-size:52px;margin-bottom:16px}
.lock-title{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--dim);margin-bottom:32px}
.lock-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:18px;padding:14px 16px;text-align:center;letter-spacing:4px;font-family:var(--font);outline:none;margin-bottom:12px}
.lock-input:focus{border-color:var(--gold)}
.lock-btn{width:100%;padding:15px;background:var(--gold);border:none;border-radius:var(--rs);font-size:16px;font-weight:800;color:#0F1117;cursor:pointer;font-family:var(--font)}
.lock-err{font-size:13px;color:var(--red);margin-top:8px;min-height:18px;text-align:center}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:17px;font-weight:800;color:var(--gold)}
.topbar-sub{font-size:11px;color:var(--dim);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-btn{background:var(--surface2);border:1px solid var(--border);color:var(--dim);border-radius:99px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s}
.sync-btn.syncing{color:var(--gold);border-color:var(--gold)}
.alert-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;border-radius:99px;padding:2px 7px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:62px;padding:11px 4px 9px;text-align:center;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
.tab-icon{font-size:16px;display:block;margin-bottom:3px}
.page{display:none;padding:16px 14px 100px;animation:fadein .2s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-card.wide{grid-column:1/-1}
.stat-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.stat-value{font-size:24px;font-weight:800;line-height:1}
.stat-sub{font-size:11px;color:var(--dim);margin-top:4px}
.gold{color:var(--gold)}.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}
.section-title{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px}
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{background:rgba(224,87,87,.1);border:1px solid rgba(224,87,87,.3);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:10px}
.alert-img{width:36px;height:36px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden}
.alert-img img{width:100%;height:100%;object-fit:cover}
.alert-name{font-size:14px;font-weight:600}
.alert-qty{font-size:12px;color:var(--red);margin-top:2px}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.form-title{font-size:15px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-gold{background:var(--gold)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px 13px;font-family:var(--font);outline:none;-webkit-appearance:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:none;height:68px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-upload{border:2px dashed var(--border);border-radius:var(--rs);padding:18px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.img-upload:hover{border-color:var(--gold)}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-icon{font-size:24px;margin-bottom:5px}
.img-upload-text{font-size:12px;color:var(--dim)}
.img-preview-wrap{position:relative;display:inline-block;width:100%}
.img-preview{width:100%;max-height:150px;object-fit:cover;border-radius:var(--rs)}
.img-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font);letter-spacing:.3px}
.btn-in{background:var(--green);color:#0F1117}
.btn-out{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#0F1117}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:10px 16px 10px 40px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.filter-row{display:flex;gap:7px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s}
.chip.active{background:var(--gold);border-color:var(--gold);color:#0F1117;font-weight:700}
.inv-list{display:flex;flex-direction:column;gap:9px}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;display:flex;gap:12px;cursor:pointer;transition:border-color .2s}
.inv-card:active{border-color:var(--gold)}
.inv-card.low{border-color:rgba(224,87,87,.4)}
.inv-card-img{width:52px;height:52px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.inv-card-img img{width:100%;height:100%;object-fit:cover}
.inv-card-info{flex:1;min-width:0}
.inv-card-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-card-code{font-size:11px;color:var(--muted);margin-top:2px}
.inv-card-meta{display:flex;align-items:baseline;gap:6px;margin-top:5px}
.inv-qty{font-size:18px;font-weight:800}
.inv-qty-label{font-size:11px;color:var(--dim)}
.inv-price{margin-left:auto;font-size:12px;color:var(--dim)}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 13px;display:flex;gap:10px;align-items:center}
.history-type{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.history-type.in{background:rgba(39,201,130,.15)}
.history-type.out{background:rgba(224,87,87,.15)}
.history-info{flex:1;min-width:0}
.history-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta{font-size:11px;color:var(--dim);margin-top:2px}
.history-qty{flex-shrink:0;text-align:right}
.history-qty-val{font-size:15px;font-weight:700}
.history-qty-val.in{color:var(--green)}
.history-qty-val.out{color:var(--red)}
.history-time{font-size:11px;color:var(--muted);margin-top:1px}
.account-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 13px;display:flex;gap:10px;align-items:center;margin-bottom:8px}
.account-type{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.account-type.income{background:rgba(39,201,130,.15)}
.account-type.expense{background:rgba(224,87,87,.15)}
.account-info{flex:1;min-width:0}
.account-partner{font-size:14px;font-weight:600}
.account-items{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.account-right{flex-shrink:0;text-align:right}
.account-amount{font-size:15px;font-weight:700}
.account-status{font-size:11px;color:var(--muted);margin-top:1px}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
.order-card:active{border-color:var(--gold)}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.order-id{font-size:11px;color:var(--muted)}
.order-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px}
.s-待確認{background:rgba(245,166,35,.15);color:var(--gold)}
.s-已確認{background:rgba(74,158,255,.15);color:var(--blue)}
.s-已出貨{background:rgba(39,201,130,.15);color:var(--green)}
.s-已完成{background:rgba(39,201,130,.2);color:var(--green)}
.s-已取消{background:rgba(224,87,87,.15);color:var(--red)}
.order-name{font-size:15px;font-weight:600}
.order-meta{font-size:12px;color:var(--dim);margin-top:4px}
.order-total{font-size:16px;font-weight:800;color:var(--gold);margin-top:5px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:88dvh;overflow-y:auto;padding:18px 18px 40px;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:var(--surface2);border:none;color:var(--dim);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-img{width:100%;max-height:180px;object-fit:cover;border-radius:var(--rs);margin-bottom:14px}
.modal-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.modal-row:last-of-type{border:none}
.modal-key{font-size:13px;color:var(--dim)}
.modal-val{font-size:13px;font-weight:600;text-align:right;max-width:60%;word-break:break-word}
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:9px 18px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--gold);color:var(--gold)}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px}
.loading{text-align:center;padding:30px;color:var(--dim);font-size:14px}
@media(min-width:600px){.page,.tabs{max-width:480px;margin-left:auto;margin-right:auto}.topbar{left:50%;transform:translateX(-50%);position:sticky;width:100%;max-width:480px}}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-logo">🏪</div>
  <div class="lock-title">養清倉管</div>
  <div class="lock-sub">請輸入管理密碼</div>
  <input class="lock-input" type="password" id="lock-pwd" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter')unlock()">
  <button class="lock-btn" onclick="unlock()">進入系統</button>
  <div class="lock-err" id="lock-err"></div>
</div>

<div id="main-app" style="display:none">
<div class="topbar">
  <div><div class="topbar-title">🏪 養清倉管</div><div class="topbar-sub" id="topbar-date"></div></div>
  <div class="topbar-right">
    <button class="sync-btn" id="sync-btn" onclick="syncAll()">⟳ 同步</button>
    <span class="alert-badge" id="alert-count" style="display:none">0</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')"><span class="tab-icon">📊</span>總覽</div>
  <div class="tab" onclick="switchTab('in')"><span class="tab-icon">📥</span>入庫</div>
  <div class="tab" onclick="switchTab('out')"><span class="tab-icon">📤</span>出庫</div>
  <div class="tab" onclick="switchTab('inventory')"><span class="tab-icon">🗃️</span>庫存</div>
  <div class="tab" onclick="switchTab('history')"><span class="tab-icon">📋</span>記錄</div>
  <div class="tab" onclick="switchTab('orders')"><span class="tab-icon">🛒</span>訂單</div>
  <div class="tab" onclick="switchTab('accounts')"><span class="tab-icon">💰</span>帳本</div>
</div>

<!-- 總覽 -->
<div class="page active" id="page-dashboard">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">總品項</div><div class="stat-value gold" id="s-total">—</div><div class="stat-sub">種商品</div></div>
    <div class="stat-card"><div class="stat-label">低庫存警示</div><div class="stat-value red" id="s-low">—</div><div class="stat-sub">項需補貨</div></div>
    <div class="stat-card"><div class="stat-label">本月收入</div><div class="stat-value green" id="s-income">—</div></div>
    <div class="stat-card"><div class="stat-label">本月支出</div><div class="stat-value blue" id="s-expense">—</div></div>
    <div class="stat-card wide"><div class="stat-label">本月淨利</div><div class="stat-value gold" id="s-profit">NT$ —</div></div>
  </div>
  <div class="section-title">⚠️ 低庫存警示</div>
  <div class="alert-list" id="alert-list"><div class="loading">載入中...</div></div>
  <div class="section-title">🕐 最近異動</div>
  <div class="history-list" id="recent-list"><div class="loading">載入中...</div></div>
</div>

<!-- 入庫 -->
<div class="page" id="page-in">
  <div class="form-card">
    <div class="form-title"><span class="dot dot-green"></span>入庫登記</div>
    <div class="field"><label>商品名稱 *</label><input type="text" id="in-name" placeholder="輸入或選擇商品" list="dl-products"><datalist id="dl-products"></datalist></div>
    <div class="field-row">
      <div class="field"><label>商品ID</label><input type="text" id="in-pid" placeholder="P001（可選）"></div>
      <div class="field"><label>數量 *</label><input type="number" id="in-qty" placeholder="0" min="1"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>進價（NT$）</label><input type="number" id="in-price" placeholder="0"></div>
      <div class="field"><label>低庫存警示值</label><input type="number" id="in-threshold" placeholder="10"></div>
    </div>
    <div class="field"><label>供應商</label><input type="text" id="in-supplier" placeholder="養清廚房總部"></div>
    <div class="field"><label>備註</label><textarea id="in-note" placeholder="批次號、備注..."></textarea></div>
    <div class="field"><label>商品圖片</label>
      <div class="img-upload" id="in-img-zone">
        <input type="file" accept="image/*" id="in-img-file" onchange="handleImg('in')">
        <div id="in-img-ph"><div class="img-upload-icon">📷</div><div class="img-upload-text">點擊上傳圖片</div></div>
        <div id="in-img-prev" style="display:none" class="img-preview-wrap"><img class="img-preview" id="in-img-show"><button class="img-remove" onclick="removeImg('in',event)">✕</button></div>
      </div>
    </div>
    <button class="btn btn-in" onclick="submitIn()">✅ 確認入庫</button>
  </div>
</div>

<!-- 出庫 -->
<div class="page" id="page-out">
  <div class="form-card">
    <div class="form-title"><span class="dot dot-red"></span>出庫登記</div>
    <div class="field"><label>商品名稱 *</label><input type="text" id="out-name" placeholder="輸入或選擇商品" list="dl-products-out"><datalist id="dl-products-out"></datalist></div>
    <div class="field-row">
      <div class="field"><label>商品ID</label><input type="text" id="out-pid" placeholder="P001（可選）"></div>
      <div class="field"><label>數量 *</label><input type="number" id="out-qty" placeholder="0" min="1"></div>
    </div>
    <div class="field"><label>零售價（NT$）</label><input type="number" id="out-price" placeholder="0"></div>
    <div class="field"><label>客戶</label><input type="text" id="out-customer" placeholder="客戶名稱"></div>
    <div class="field"><label>備註</label><textarea id="out-note" placeholder="訂單號、備注..."></textarea></div>
    <button class="btn btn-out" onclick="submitOut()">📤 確認出庫</button>
  </div>
</div>

<!-- 庫存 -->
<div class="page" id="page-inventory">
  <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="搜尋商品名稱、ID..." id="inv-search" oninput="renderInventory()"></div>
  <div class="filter-row">
    <div class="chip active" onclick="setFilter('all',this)">全部</div>
    <div class="chip" onclick="setFilter('low',this)">⚠️ 低庫存</div>
    <div class="chip" onclick="setFilter('zero',this)">❌ 零庫存</div>
    <div class="chip" onclick="setFilter('養生調理',this)">養生調理</div>
    <div class="chip" onclick="setFilter('養生調味料',this)">調味料</div>
    <div class="chip" onclick="setFilter('健康食品',this)">健康食品</div>
    <div class="chip" onclick="setFilter('能量用品',this)">能量用品</div>
    <div class="chip" onclick="setFilter('養生沖調飲品',this)">飲品</div>
  </div>
  <div class="inv-list" id="inv-list"><div class="loading">載入中...</div></div>
</div>

<!-- 記錄 -->
<div class="page" id="page-history">
  <div class="filter-row">
    <div class="chip active" onclick="setHistFilter('all',this)">全部</div>
    <div class="chip" onclick="setHistFilter('入庫',this)">📥 入庫</div>
    <div class="chip" onclick="setHistFilter('出庫',this)">📤 出庫</div>
  </div>
  <div class="history-list" id="history-list"><div class="loading">載入中...</div></div>
</div>

<!-- 訂單 -->
<div class="page" id="page-orders">
  <div class="filter-row">
    <div class="chip active" onclick="setOrderFilter('all',this)">全部</div>
    <div class="chip" onclick="setOrderFilter('待確認',this)">待確認</div>
    <div class="chip" onclick="setOrderFilter('已確認',this)">已確認</div>
    <div class="chip" onclick="setOrderFilter('已出貨',this)">已出貨</div>
    <div class="chip" onclick="setOrderFilter('已完成',this)">已完成</div>
  </div>
  <div id="order-list"><div class="loading">載入中...</div></div>
</div>

<!-- 帳本 -->
<div class="page" id="page-accounts">
  <div class="stats-grid" id="balance-grid"><div class="loading" style="grid-column:1/-1">載入中...</div></div>
  <div class="section-title">收支明細</div>
  <div class="filter-row">
    <div class="chip active" onclick="setAccFilter('all',this)">全部</div>
    <div class="chip" onclick="setAccFilter('銷售收款',this)">💚 銷售</div>
    <div class="chip" onclick="setAccFilter('進貨付款',this)">🔴 進貨</div>
    <div class="chip" onclick="setAccFilter('其他收入',this)">其他收入</div>
    <div class="chip" onclick="setAccFilter('其他支出',this)">其他支出</div>
  </div>
  <div id="account-list"><div class="loading">載入中...</div></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">詳情</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbz4-pJ5jWtu9nevKDl98LxRqfwyVdGApEqEzcKKR9LDxanUM5BCneCZttkH3rkxLlUtYA/exec';
const ADMIN_KEY='YANGCHING2025';
let cache={products:[],inventory:[],stockLog:[],orders:[],accounts:[],balance:{}};
let invFilter='all',histFilter='all',orderFilter='all',accFilter='all';
let imgData={in:null};

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h.toString(36)}

const PWD='17good';
function unlock(){
  const pwd=document.getElementById('lock-pwd').value;
  if(!pwd)return;
  if(pwd===PWD){enterApp();}
  else{document.getElementById('lock-err').textContent='密碼錯誤，請重試';document.getElementById('lock-pwd').value='';}
}

function enterApp(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  init();
}

async function api(params){
  const r=await fetch(GAS_URL+'?'+new URLSearchParams(params).toString());
  return await r.json();
}
async function apiPost(params){
  const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(params),headers:{'Content-Type':'application/json'}});
  return await r.json();
}

async function syncAll(){
  const btn=document.getElementById('sync-btn');
  btn.textContent='⟳ 同步中';btn.classList.add('syncing');
  try{
    const [p,inv,log,ord,acc,bal]=await Promise.all([
      api({action:'getProducts'}),
      api({action:'getInventory'}),
      api({action:'getStockLog',limit:100}),
      api({action:'getOrders',key:ADMIN_KEY}),
      api({action:'getAccounts',key:ADMIN_KEY}),
      api({action:'getBalance',key:ADMIN_KEY})
    ]);
    if(p.ok)   cache.products =p.data;
    if(inv.ok) cache.inventory=inv.data;
    if(log.ok) cache.stockLog =log.data;
    if(ord.ok) cache.orders   =ord.data;
    if(acc.ok) cache.accounts =acc.data;
    if(bal.ok) cache.balance  =bal.data;
    localStorage.setItem('yc_cache',JSON.stringify(cache));
    refreshDatalist();renderAll();
    showToast('✅ 同步完成','success');
  }catch(e){showToast('⚠️ 同步失敗，使用本機資料','error');}
  btn.textContent='⟳ 同步';btn.classList.remove('syncing');
}

function renderAll(){renderDashboard();renderInventory();renderHistory();renderOrders();renderAccounts();}

function init(){
  document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('zh-TW',{weekday:'short',month:'long',day:'numeric'});
  const saved=localStorage.getItem('yc_cache');
  if(saved){try{cache=JSON.parse(saved);}catch(e){}}
  refreshDatalist();renderAll();syncAll();
}

function switchTab(tab){
  const tabs=['dashboard','in','out','inventory','history','orders','accounts'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
}

function handleImg(type){
  const file=document.getElementById(type+'-img-file').files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{imgData[type]=e.target.result;document.getElementById(type+'-img-ph').style.display='none';document.getElementById(type+'-img-prev').style.display='block';document.getElementById(type+'-img-show').src=e.target.result;};
  r.readAsDataURL(file);
}
function removeImg(type,e){if(e)e.stopPropagation();imgData[type]=null;document.getElementById(type+'-img-file').value='';document.getElementById(type+'-img-ph').style.display='block';document.getElementById(type+'-img-prev').style.display='none';}

function refreshDatalist(){
  const opts=cache.products.map(p=>`<option value="${p.name}">`).join('');
  document.getElementById('dl-products').innerHTML=opts;
  document.getElementById('dl-products-out').innerHTML=opts;
}
function getPidByName(name){const p=cache.products.find(x=>x.name===name);return p?p.product_id:null;}

async function submitIn(){
  const name=document.getElementById('in-name').value.trim();
  const qty=parseInt(document.getElementById('in-qty').value);
  if(!name||!qty||qty<1){showToast('請填寫商品名稱與數量','error');return;}
  const pid=document.getElementById('in-pid').value.trim()||getPidByName(name);
  if(!pid){showToast('找不到商品ID，請確認名稱或手動填入','error');return;}
  showToast('⟳ 送出中...','info');
  try{
    const r=await apiPost({action:'stockIn',key:ADMIN_KEY,product_id:pid,qty,
      price:document.getElementById('in-price').value||'',
      threshold:document.getElementById('in-threshold').value||10,
      partner:document.getElementById('in-supplier').value.trim()||'養清廚房總部',
      note:document.getElementById('in-note').value.trim()});
    if(r.ok){showToast(`✅ 入庫成功：${name} × ${qty}`,'success');resetForm('in');syncAll();}
    else showToast('❌ '+r.error,'error');
  }catch(e){showToast('⚠️ 網路錯誤','error');}
}

async function submitOut(){
  const name=document.getElementById('out-name').value.trim();
  const qty=parseInt(document.getElementById('out-qty').value);
  if(!name||!qty||qty<1){showToast('請填寫商品名稱與數量','error');return;}
  const pid=document.getElementById('out-pid').value.trim()||getPidByName(name);
  if(!pid){showToast('找不到商品ID，請確認名稱或手動填入','error');return;}
  showToast('⟳ 送出中...','info');
  try{
    const r=await apiPost({action:'stockOut',key:ADMIN_KEY,product_id:pid,qty,
      price:document.getElementById('out-price').value||'',
      partner:document.getElementById('out-customer').value.trim(),
      note:document.getElementById('out-note').value.trim()});
    if(r.ok){showToast(`📤 出庫成功：${name} × ${qty}`,'success');resetForm('out');syncAll();}
    else showToast('❌ '+r.error,'error');
  }catch(e){showToast('⚠️ 網路錯誤','error');}
}

function resetForm(type){
  ['name','pid','qty','price','note'].forEach(f=>{const el=document.getElementById(type+'-'+f);if(el)el.value='';});
  if(type==='in'){document.getElementById('in-supplier').value='';document.getElementById('in-threshold').value='';removeImg('in',null);}
  else document.getElementById('out-customer').value='';
}

function renderDashboard(){
  const inv=cache.inventory;const low=inv.filter(p=>p.qty>0&&p.qty<=p.threshold);const zero=inv.filter(p=>p.qty===0);const bal=cache.balance;
  document.getElementById('s-total').textContent=cache.products.length||'0';
  document.getElementById('s-low').textContent=low.length+zero.length;
  document.getElementById('s-income').textContent=bal['本月收入']?'NT$ '+Number(bal['本月收入']).toLocaleString():'NT$ 0';
  document.getElementById('s-expense').textContent=bal['本月支出']?'NT$ '+Number(bal['本月支出']).toLocaleString():'NT$ 0';
  document.getElementById('s-profit').textContent='NT$ '+(bal['本月淨利']?Number(bal['本月淨利']).toLocaleString():'0');
  const badge=document.getElementById('alert-count');const ac=low.length+zero.length;badge.style.display=ac>0?'inline':'none';badge.textContent=ac;
  const al=document.getElementById('alert-list');const items=[...low,...zero];
  al.innerHTML=items.length?items.slice(0,5).map(p=>`<div class="alert-item"><div class="alert-img">${p.image_url?`<img src="${p.image_url}">`:'📦'}</div><div><div class="alert-name">${p.name}</div><div class="alert-qty">${p.qty===0?'❌ 已無庫存':`⚠️ 剩 ${p.qty} 件（警示：${p.threshold}）`}</div></div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">庫存充足</div></div>`;
  const rl=document.getElementById('recent-list');const recent=cache.stockLog.slice(0,5);
  rl.innerHTML=recent.length?recent.map(h=>histHTML(h)).join(''):`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">尚無記錄</div></div>`;
}

function setFilter(f,el){invFilter=f;document.querySelectorAll('#page-inventory .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderInventory();}
function renderInventory(){
  const q=(document.getElementById('inv-search').value||'').toLowerCase();
  let list=[...cache.inventory];
  if(invFilter==='low')list=list.filter(p=>p.qty>0&&p.qty<=p.threshold);
  else if(invFilter==='zero')list=list.filter(p=>p.qty===0);
  else if(invFilter!=='all')list=list.filter(p=>p.category===invFilter);
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.product_id||'').toLowerCase().includes(q));
  const el=document.getElementById('inv-list');
  el.innerHTML=list.length?list.map(p=>`<div class="inv-card ${p.qty<=p.threshold&&p.qty>0?'low':''}" onclick="showProductModal('${p.product_id}')"><div class="inv-card-img">${p.image_url?`<img src="${p.image_url}">`:'📦'}</div><div class="inv-card-info"><div class="inv-card-name">${p.name}</div><div class="inv-card-code">${p.product_id}${p.category?' · '+p.category:''}</div><div class="inv-card-meta"><span class="inv-qty ${p.qty===0?'red':p.qty<=p.threshold?'red':'green'}">${p.qty}</span><span class="inv-qty-label">件</span><span class="inv-price">${p.retail_price?'NT$ '+Number(p.retail_price).toLocaleString():''}</span></div></div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">🗃️</div><div class="empty-text">沒有符合商品</div></div>`;
}

function showProductModal(pid){
  const p=cache.inventory.find(x=>x.product_id===pid);if(!p)return;
  document.getElementById('modal-title').textContent=p.name;
  document.getElementById('modal-body').innerHTML=`${p.image_url?`<img class="modal-img" src="${p.image_url}">`:''}
    <div class="modal-row"><span class="modal-key">商品ID</span><span class="modal-val">${p.product_id}</span></div>
    <div class="modal-row"><span class="modal-key">分類</span><span class="modal-val">${p.category||'—'}</span></div>
    <div class="modal-row"><span class="modal-key">目前庫存</span><span class="modal-val" style="color:${p.qty<=p.threshold?'var(--red)':'var(--green)'}">${p.qty} 件</span></div>
    <div class="modal-row"><span class="modal-key">零售價</span><span class="modal-val">${p.retail_price?'NT$ '+Number(p.retail_price).toLocaleString():'—'}</span></div>
    <div class="modal-row"><span class="modal-key">進價</span><span class="modal-val">${p.cost_price?'NT$ '+Number(p.cost_price).toLocaleString():'待補'}</span></div>
    <div class="modal-row"><span class="modal-key">警示值</span><span class="modal-val">${p.threshold} 件</span></div>
    <div class="modal-row"><span class="modal-key">庫存總值</span><span class="modal-val">NT$ ${(p.qty*(p.retail_price||0)).toLocaleString()}</span></div>
    <div class="modal-row"><span class="modal-key">最後更新</span><span class="modal-val">${p.updated_at||'—'}</span></div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function setHistFilter(f,el){histFilter=f;document.querySelectorAll('#page-history .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderHistory();}
function histHTML(h){
  const t=h.created_at?new Date(h.created_at):null;
  const ts=t?`${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`:h.created_at||'';
  return `<div class="history-item"><div class="history-type ${h.type==='入庫'?'in':'out'}">${h.type==='入庫'?'📥':'📤'}</div><div class="history-info"><div class="history-name">${h.name}</div><div class="history-meta">${h.partner||h.type}${h.note?' · '+h.note:''}</div></div><div class="history-qty"><div class="history-qty-val ${h.type==='入庫'?'in':'out'}">${h.type==='入庫'?'+':'-'}${h.qty}</div><div class="history-time">${ts}</div></div></div>`;
}
function renderHistory(){
  let list=histFilter==='all'?cache.stockLog:cache.stockLog.filter(h=>h.type===histFilter);
  document.getElementById('history-list').innerHTML=list.length?list.map(h=>histHTML(h)).join(''):`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">尚無記錄</div></div>`;
}

function setOrderFilter(f,el){orderFilter=f;document.querySelectorAll('#page-orders .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderOrders();}
function renderOrders(){
  let list=orderFilter==='all'?cache.orders:cache.orders.filter(o=>o.status===orderFilter);
  const el=document.getElementById('order-list');
  el.innerHTML=list.length?list.map(o=>`<div class="order-card" onclick="showOrderModal('${o.order_id}')"><div class="order-header"><span class="order-id">${o.order_id}</span><span class="order-status s-${o.status}">${o.status}</span></div><div class="order-name">${o.customer_name}</div><div class="order-meta">📞 ${o.phone} · ${o.payment}</div><div class="order-total">NT$ ${Number(o.total).toLocaleString()}</div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">尚無訂單</div></div>`;
}

function showOrderModal(oid){
  const o=cache.orders.find(x=>x.order_id===oid);if(!o)return;
  document.getElementById('modal-title').textContent='訂單 '+oid.slice(-8);
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-row"><span class="modal-key">客人姓名</span><span class="modal-val">${o.customer_name}</span></div>
    <div class="modal-row"><span class="modal-key">電話</span><span class="modal-val">${o.phone}</span></div>
    <div class="modal-row"><span class="modal-key">地址</span><span class="modal-val">${o.address||'—'}</span></div>
    <div class="modal-row"><span class="modal-key">總金額</span><span class="modal-val gold">NT$ ${Number(o.total).toLocaleString()}</span></div>
    <div class="modal-row"><span class="modal-key">付款方式</span><span class="modal-val">${o.payment}</span></div>
    <div class="modal-row"><span class="modal-key">狀態</span><span class="modal-val">${o.status}</span></div>
    <div class="modal-row"><span class="modal-key">備註</span><span class="modal-val">${o.note||'—'}</span></div>
    <div class="modal-actions">
      ${o.status==='待確認'?`<button class="btn btn-gold" onclick="confirmOrder('${oid}',true)">✅ 確認並扣庫存</button><button class="btn btn-ghost" style="margin-top:0" onclick="confirmOrder('${oid}',false)">確認（不扣庫存）</button>`:''}
      ${o.status==='已確認'?`<button class="btn btn-in" onclick="updOrder('${oid}','已出貨')">🚚 標記已出貨</button>`:''}
      ${o.status==='已出貨'?`<button class="btn btn-gold" onclick="updOrder('${oid}','已完成')">✅ 標記已完成</button>`:''}
      ${['待確認','已確認'].includes(o.status)?`<button class="btn" style="background:transparent;border:1px solid var(--red);color:var(--red)" onclick="updOrder('${oid}','已取消')">取消訂單</button>`:''}
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function confirmOrder(oid,deduct){
  closeModal();showToast('⟳ 處理中...','info');
  const r=await apiPost({action:'updateOrder',key:ADMIN_KEY,order_id:oid,status:'已確認',deduct:deduct?'true':'false'});
  if(r.ok){showToast('✅ 訂單已確認','success');syncAll();}else showToast('❌ '+r.error,'error');
}
async function updOrder(oid,status){
  closeModal();showToast('⟳ 更新中...','info');
  const r=await apiPost({action:'updateOrder',key:ADMIN_KEY,order_id:oid,status});
  if(r.ok){showToast('✅ 狀態已更新','success');syncAll();}else showToast('❌ '+r.error,'error');
}

function setAccFilter(f,el){accFilter=f;document.querySelectorAll('#page-accounts .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderAccounts();}
function renderAccounts(){
  const bal=cache.balance;
  document.getElementById('balance-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">本月收入</div><div class="stat-value green">${bal['本月收入']?'NT$ '+Number(bal['本月收入']).toLocaleString():'NT$ 0'}</div></div>
    <div class="stat-card"><div class="stat-label">本月支出</div><div class="stat-value red">${bal['本月支出']?'NT$ '+Number(bal['本月支出']).toLocaleString():'NT$ 0'}</div></div>
    <div class="stat-card"><div class="stat-label">應收帳款</div><div class="stat-value gold">${bal['應收帳款']?'NT$ '+Number(bal['應收帳款']).toLocaleString():'NT$ 0'}</div></div>
    <div class="stat-card"><div class="stat-label">應付帳款</div><div class="stat-value blue">${bal['應付帳款']?'NT$ '+Number(bal['應付帳款']).toLocaleString():'NT$ 0'}</div></div>
    <div class="stat-card wide"><div class="stat-label">累計淨利</div><div class="stat-value gold">${bal['淨利']?'NT$ '+Number(bal['淨利']).toLocaleString():'NT$ 0'}</div></div>`;
  let list=accFilter==='all'?cache.accounts:cache.accounts.filter(a=>a.type===accFilter);
  const el=document.getElementById('account-list');
  if(!list.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">💰</div><div class="empty-text">尚無帳目記錄</div></div>`;return;}
  el.innerHTML=list.map(a=>{const inc=a.income&&Number(a.income)>0;return `<div class="account-item"><div class="account-type ${inc?'income':'expense'}">${inc?'💚':'🔴'}</div><div class="account-info"><div class="account-partner">${a.partner||a.type}</div><div class="account-items">${a.items||'—'} · ${a.date||''}</div></div><div class="account-right"><div class="account-amount ${inc?'green':'red'}">${inc?'+NT$ '+Number(a.income).toLocaleString():'-NT$ '+Number(a.expense).toLocaleString()}</div><div class="account-status">${a.status||''}</div></div></div>`;}).join('');
}

function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
